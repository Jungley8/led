services:
  led:
    build: .
    # image: ghcr.io/jungley8/led:latest   # or pull the published image instead of building
    ports:
      # Host port is configurable: if 8080 is taken, set LED_PORT=9000 in .env.
      - "${LED_PORT:-8080}:8080"
    environment:
      LED_SECRET_KEY: ${LED_SECRET_KEY:?set in .env}
      LED_ADMIN_PASSWORD: ${LED_ADMIN_PASSWORD:?set in .env}
      LED_ADMIN_USER: ${LED_ADMIN_USER:-admin}
      LED_INBOUND_TOKEN: ${LED_INBOUND_TOKEN:-}
      LED_ADMIN_HOST: ${LED_ADMIN_HOST:-}
      # SQLite by default; data persisted in the named volume below.
      LED_DB_DRIVER: ${LED_DB_DRIVER:-sqlite}
      LED_DB_DSN: ${LED_DB_DSN:-/data/led.db}
      # Optional GeoLite2 mmdb for click geo stats (see the volume mount below).
      LED_GEOIP_DB: ${LED_GEOIP_DB:-}
    volumes:
      - led-data:/data
      # To enable GeoIP, put a GeoLite2-City.mmdb next to this file on the host,
      # uncomment the mount below, and set LED_GEOIP_DB=/data/GeoLite2-City.mmdb
      # in your .env. (The path on the RIGHT is what LED_GEOIP_DB must point to.)
      # - ./GeoLite2-City.mmdb:/data/GeoLite2-City.mmdb:ro
    restart: unless-stopped

volumes:
  led-data:
